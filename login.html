<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pianist</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8rem 1.5rem 4rem;
            background: radial-gradient(circle at top right, var(--primary-dark), var(--background));
        }

        .auth-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--foreground);
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            color: var(--muted-foreground);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--foreground);
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            background: var(--background);
            color: var(--foreground);
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
            color: var(--muted-foreground);
        }

        .auth-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-link:hover {
            text-decoration: underline;
        }

        .btn-block {
            width: 100%;
            display: block;
            text-align: center;
        }

        .password-field-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-field-wrapper input {
            width: 100%;
        }

        .toggle-password-btn {
            position: absolute;
            right: 0.75rem;
            background: none;
            border: none;
            color: var(--muted-foreground);
            cursor: pointer;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        .toggle-password-btn:hover {
            color: var(--foreground);
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <header class="header glassmorphism">
        <nav class="nav-container">
            <div class="nav-content">
                <a href="index.html" class="logo-container slide-in-left"
                    style="text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">
                    <img src="assets/images/logo.png" alt="Logo" style="height: 40px; width: auto;">
                    <span class="logo-text">Pianist</span>
                </a>
                <div class="nav-content"><a href="index.html" class="nav-link"><i
                            class="fa-solid fa-arrow-left"></i><span style="margin-left: 0.5rem;">Back to
                            Home</span></a></div>
            </div>
        </nav>
    </header>

    <div class="auth-container">
        <div class="auth-card fade-in-up">
            <div class="auth-header">
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Login to access your dashboard</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label for="password" class="form-label" style="margin-bottom: 0;">Password</label>
                        
                    </div>
                    <div class="password-field-wrapper">
                        <input type="password" id="password" name="password" class="form-input" placeholder="••••••••••••" required>
                        <button type="button" class="toggle-password-btn" onclick="togglePassword('password')">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                    <a href="#" class="auth-link" style="font-size: 0.875rem; margin-top: 0.5rem;">Forgot Password?</a>
                </div>

                <button type="submit" class="hero-btn btn-block">Login</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html" class="auth-link">Sign Up</a>
            </div>
        </div>
    </div>
    <script src="./assets/js/script.js" defer></script>
</body>

</html>
