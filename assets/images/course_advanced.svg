<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e1065;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg2)"/>
  
  <!-- Abstract Fast Notes Flow -->
  <path d="M50,300 Q200,100 350,300 T650,300 T950,300" stroke="rgba(255,255,255,0.3)" stroke-width="4" fill="none"/>
  <path d="M50,350 Q200,150 350,350 T650,350 T950,350" stroke="rgba(255,255,255,0.2)" stroke-width="4" fill="none"/>
  
  <!-- Musical Notes -->
  <g fill="white" transform="translate(200, 250)">
    <circle cx="0" cy="0" r="15"/>
    <rect x="14" y="-50" width="4" height="60"/>
    <path d="M18,-50 Q30,-40 30,-20" stroke="white" stroke-width="4" fill="none"/>
  </g>
  
  <g fill="white" transform="translate(350, 200)">
    <circle cx="0" cy="0" r="15"/>
    <rect x="14" y="-50" width="4" height="60"/>
    <rect x="14" y="-50" width="40" height="10"/>
    <rect x="54" y="-50" width="4" height="60"/>
    <circle cx="44" cy="0" r="15"/>
  </g>
  
  <g fill="white" transform="translate(500, 280)">
    <circle cx="0" cy="0" r="15"/>
    <rect x="14" y="-50" width="4" height="60"/>
    <path d="M18,-50 Q30,-30 30,-10" stroke="white" stroke-width="4" fill="none"/>
  </g>
  
  <text x="400" y="500" font-family="Arial, sans-serif" font-size="34" fill="white" text-anchor="middle" font-weight="bold" letter-spacing="4">MASTERY</text>
</svg>
