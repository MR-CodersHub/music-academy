<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg_theory" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b45309;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="black" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg_theory)"/>
  
  <!-- Musical Staff Background -->
  <g stroke="rgba(255,255,255,0.2)" stroke-width="2">
    <line x1="100" y1="150" x2="700" y2="150"/>
    <line x1="100" y1="180" x2="700" y2="180"/>
    <line x1="100" y1="210" x2="700" y2="210"/>
    <line x1="100" y1="240" x2="700" y2="240"/>
    <line x1="100" y1="270" x2="700" y2="270"/>
  </g>

  <!-- Sheet Music Paper -->
  <rect x="250" y="100" width="300" height="400" fill="white" rx="5" filter="url(#shadow)"/>
  
  <!-- Staff on Paper -->
  <g stroke="#333" stroke-width="1" transform="translate(250, 100)">
    <line x1="30" y1="80" x2="270" y2="80"/>
    <line x1="30" y1="100" x2="270" y2="100"/>
    <line x1="30" y1="120" x2="270" y2="120"/>
    <line x1="30" y1="140" x2="270" y2="140"/>
    <line x1="30" y1="160" x2="270" y2="160"/>
    
    <!-- Treble Clef -->
    <path d="M60,190 C40,190 35,170 50,155 C65,140 90,140 90,110 C90,90 75,85 70,85 L70,40 C85,40 100,60 100,90 C100,130 65,130 65,155 C65,165 70,170 75,170 C80,170 85,160 85,155" 
          fill="none" stroke="black" stroke-width="3"/>
          
    <circle cx="120" cy="140" r="7" fill="black"/>
    <line x1="127" y1="140" x2="127" y2="100" stroke="black" stroke-width="2"/>
    
    <circle cx="160" cy="120" r="7" fill="black"/>
     <line x1="167" y1="120" x2="167" y2="80" stroke="black" stroke-width="2"/>
  </g>
  
  <!-- Feather Pen / Quill -->
  <path d="M550,350 Q580,300 650,250 Q680,230 700,200 L710,210 Q680,250 660,280 Q600,360 560,370 Z" fill="#fef3c7" stroke="#92400e" stroke-width="2" filter="url(#shadow)"/>
  <path d="M560,370 L550,380 L565,375 Z" fill="#333"/>

  <text x="400" y="550" font-family="Arial, sans-serif" font-size="34" fill="white" text-anchor="middle" font-weight="bold" letter-spacing="4">COMPOSITION</text>
</svg>
