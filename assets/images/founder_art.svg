<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grad1)" />
  <rect width="100%" height="100%" fill="url(#grid)" />
  <g transform="translate(100, 100)" fill="rgba(255,255,255,0.2)">
     <path d="M10,120 Q50,20 120,80 T250,150" fill="none" stroke="white" stroke-width="5" opacity="0.5"/>
     <path d="M50,180 Q120,60 220,120" fill="none" stroke="white" stroke-width="3" opacity="0.3"/>
     <circle cx="200" cy="100" r="50" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
  </g>
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="40" fill="white" font-weight="bold" letter-spacing="2">ARTISTRY</text>
</svg>
